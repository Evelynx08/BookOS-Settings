<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><link rel="stylesheet" href="style.css"><title>Ajustes de BookOS</title></head>
<body>
<div class="main-container" id="mc">
    <div class="titlebar" data-tauri-drag-region>
        <button id="sidebar-toggle" class="sb-toggle" aria-label="Toggle sidebar" title="Mostrar/ocultar barra lateral">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
        </button>
        <div class="controls"><button id="minimize">─</button><button id="maximize">☐</button><button id="close">✕</button></div>
    </div>
    <div class="split-view">
        <div class="sidebar" id="sidebar-panel">
            <div class="sidebar-header" data-tauri-drag-region><h1 class="header-title" data-tauri-drag-region>Ajustes</h1></div>
            <div class="search-container" id="search-box"><img src="assets/search.svg" class="search-icon-img" alt=""><input type="text" class="search-bar" id="search-in" placeholder="Buscar ajustes..." autocomplete="off"><button class="search-clear" id="search-x" style="visibility:hidden">✕</button></div>
            <div id="sb"></div><div id="no-res" class="no-results" style="display:none">No se encontraron resultados</div>
        </div>
        <div class="detail-view"><div id="app"></div></div>
    </div>
</div>
<script type="module" src="main.js"></script>
</body></html>
